<!-- Status Summary -->
<div class="status-summary-container">
    <div class="status-header">
        <i class="fas fa-chart-bar"></i>
        <span>Status Summary</span>
    </div>

    <div class="dashboard-columns">
        <div class="status-card total-card">
            <div class="card-header-section">
                <i class="fas fa-list-ul"></i>
                <h4>Total Items</h4>
            </div>
            <div class="card-content">
                <div class="stat-item">
                    <span class="stat-label">PO:</span>
                    <span class="stat-value">12</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">OCR:</span>
                    <span class="stat-value">15</span>
                </div>
            </div>
        </div>

        <div class="status-card issues-card">
            <div class="card-header-section">
                <i class="fas fa-exclamation-triangle"></i>
                <h4>Issues Found</h4>
            </div>
            <div class="card-content">
                <div class="stat-item">
                    <i class="fas fa-plus-circle stat-icon"></i>
                    <span class="stat-label">New:</span>
                    <span class="stat-value">5</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-box-open stat-icon"></i>
                    <span class="stat-label">Zero Qty:</span>
                    <span class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-dollar-sign stat-icon"></i>
                    <span class="stat-label">Zero Price:</span>
                    <span class="stat-value">1</span>
                </div>
            </div>
        </div>

        <div class="status-card po-check-card">
            <div class="card-header-section">
                <i class="fas fa-check-double"></i>
                <h4>PO Validation</h4>
            </div>
            <div class="card-content">
                <div class="stat-item">
                    <i class="fas fa-paper-plane stat-icon"></i>
                    <span class="stat-label">Not Sent:</span>
                    <span class="stat-value">1</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-times-circle stat-icon"></i>
                    <span class="stat-label">Not In PO:</span>
                    <span class="stat-value">2</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-balance-scale stat-icon"></i>
                    <span class="stat-label">Qty Mismatch:</span>
                    <span class="stat-value">3</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-tag stat-icon"></i>
                    <span class="stat-label">Price Mismatch:</span>
                    <span class="stat-value">2</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-percentage stat-icon"></i>
                    <span class="stat-label">Tax Mismatch:</span>
                    <span class="stat-value">1</span>
                </div>
            </div>
        </div>
    </div>
</div>
